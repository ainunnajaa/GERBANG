<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Offline - Presensi QR</title>
    <style>
        :root {
            color-scheme: light dark;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #fef9c3, #dbeafe);
            color: #0f172a;
            padding: 24px;
        }

        .card {
            width: min(520px, 100%);
            background: rgba(255, 255, 255, 0.94);
            border-radius: 16px;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.16);
            padding: 28px;
            text-align: center;
            border: 2px solid #93c5fd;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 1.5rem;
        }

        p {
            margin: 0;
            line-height: 1.6;
        }

        a {
            display: inline-block;
            margin-top: 16px;
            text-decoration: none;
            color: #ffffff;
            background: #2563eb;
            padding: 10px 16px;
            border-radius: 999px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Kamu sedang offline</h1>
        <p>Halaman ini belum bisa dibuka tanpa internet. Coba lagi setelah koneksi kembali normal.</p>
        <a href="/">Coba Buka Beranda</a>
    </main>
</body>
</html>
